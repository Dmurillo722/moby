<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background-color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center">
          <table role="presentation" width="600" style="max-width:600px; width:100%; background-color:#0b0f19; padding:20px;">
            <tr>
              <td>
                <div style="margin-bottom:20px;">
                  <h1 style="margin:0; font-size:22px; color:#ffffff; font-family:Arial, sans-serif;">
                    Moby
                  </h1>
                  <p style="margin:5px 0 0; font-size:14px; color:#9ca3af; font-family:Arial, sans-serif;">
                    Market Alert Notification
                  </p>
                </div>
                <div style="background-color:#111827; border:1px solid #1f2937; border-radius:10px; padding:24px; font-family:Arial, sans-serif;">
                  <h2 style="margin-top:0; color:#f87171;">
                    🚨 Abnormal Trade Activity Detected
                  </h2>
                  <div style="text-align:center; margin:30px 0;">
                    <p style="margin:0; font-size:12px; color:#9ca3af;">SYMBOL</p>
                    <h1 style="margin:5px 0; font-size:42px; color:#ffffff;">
                      {{symbol}}
                    </h1>
                  </div>
                  <table role="presentation" width="100%" style="margin-bottom:20px;">
                    <tr>
                      <td style="padding-right:40px;">
                        <p style="margin:0; font-size:12px; color:#9ca3af;">Trade Size</p>
                        <p style="margin:5px 0; font-size:18px; font-weight:bold; color:#ffffff;">
                          {{trade_size}}
                        </p>
                      </td>
                      <td style="border-left:1px solid #1f2937; padding-left:40px;">
                        <p style="margin:0; font-size:12px; color:#9ca3af;">Confidence</p>
                        <p style="margin:5px 0; font-size:18px; font-weight:bold; color:#ffffff;">
                          {{confidence}}
                        </p>
                      </td>
                    </tr>
                  </table>
                  <div style="background:#0b1220; padding:15px; border-radius:8px; border:1px solid #1f2937;">
                    <p style="margin:0; font-size:14px; color:#d1d5db;">
                      {{custom_message}}
                    </p>
                  </div>
                </div>
                <div style="text-align:center; margin-top:20px; font-size:12px; color:#6b7280; font-family:Arial, sans-serif;">
                  You’re receiving this because you enabled alerts in Moby.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
