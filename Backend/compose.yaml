services:
  app:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: moby-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - moby_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped

  ingestion_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.ingestion_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  eval_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.eval_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  notification_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.notification_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  detection_engine_worker:
    build: . 
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.detection_engine_worker"]
    volumes:
      - ./app:/app/app
      - ./detection_engine:/app/detection_engine
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  moby_db_data:
  redis-data:
