services:
  app:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki

  redis:
    image: redis:7
    container_name: moby-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - moby_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped

  ingestion_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.ingestion_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  eval_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.eval_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  notification_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: ["uv", "run", "python", "-m", "app.workers.notification_worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  detection_engine_worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command:
      ["uv", "run", "python", "-m", "app.workers.detection_engine_worker"]
    volumes:
      - ./app:/app/app
      - ./detection_engine:/app/detection_engine
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  moby_db_data:
  redis-data:
